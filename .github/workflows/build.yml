name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained single-file exe
        run: dotnet publish src/XiloOVR -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Drop debug symbols from the package
        run: Remove-Item publish/*.pdb -ErrorAction SilentlyContinue

      - name: Zip
        run: Compress-Archive -Path publish/* -DestinationPath XiloOVR-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XiloOVR-win-x64
          path: publish/

      - name: Create GitHub release (on v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: XiloOVR-win-x64.zip
          generate_release_notes: true
